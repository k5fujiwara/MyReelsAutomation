name: Post To Instagram

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_ACTIONS: "true"
      INSTAGRAM_PUBLISH_ENABLED: "true"
      INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_GRAPH_API_VERSION: ${{ secrets.INSTAGRAM_GRAPH_API_VERSION }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODELS: ${{ secrets.GEMINI_MODELS }}
      HP_URL: ${{ secrets.HP_URL }}
      NOTE_URL: ${{ secrets.NOTE_URL }}
      HP_RSS_URL: ${{ secrets.HP_RSS_URL }}
      NOTE_RSS_URL: ${{ secrets.NOTE_RSS_URL }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      CLOUDINARY_FOLDER: ${{ secrets.CLOUDINARY_FOLDER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run generator and publisher
        run: python main.py

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-run-output
          path: |
            output/
            state/
          if-no-files-found: ignore
