name: Post To Instagram

on:
  workflow_dispatch:
    inputs:
      debug_token_fingerprint:
        description: "Print FACEBOOK_ACCESS_TOKEN SHA-256 prefix for debugging"
        required: false
        default: "false"
  schedule:
    - cron: "30 22 * * 0-4"

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_ACTIONS: "true"
      INSTAGRAM_PUBLISH_ENABLED: "true"
      INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
      FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
      INSTAGRAM_GRAPH_API_VERSION: "v22.0"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODELS: "gemini-3.1-flash-lite-preview,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.0-flash"
      HP_URL: "https://info-study.com/"
      NOTE_URL: "https://note.com/k5fujiwara"
      HP_RSS_URL: "https://info-study.com/feed"
      NOTE_RSS_URL: "https://note.com/k5fujiwara/rss"
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      CLOUDINARY_FOLDER: "myreelsautomation"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Validate required secrets
        run: |
          missing=0
          for name in INSTAGRAM_BUSINESS_ID FACEBOOK_ACCESS_TOKEN GEMINI_API_KEY CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Print token fingerprint
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_token_fingerprint == 'true' }}
        run: |
          token_hash=$(printf '%s' "$FACEBOOK_ACCESS_TOKEN" | sha256sum | cut -c1-12)
          echo "FACEBOOK_ACCESS_TOKEN SHA256 prefix: $token_hash"

      - name: Run generator and publisher
        run: python main.py

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-run-output
          path: |
            output/
            state/
          if-no-files-found: ignore
